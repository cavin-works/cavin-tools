name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (Apple Silicon) - 主要 macOS 构建
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            generate-changelog: true
          # 注意：x86_64-apple-darwin 和 universal-apple-darwin 已移除
          # 因为 ort (ONNX Runtime) 不提供 Intel Mac 预编译二进制
          # Windows x64
          - platform: "windows-latest"
            args: ""
          # Intel Mac (x86_64) - 无背景去除功能
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: -- --no-default-features --features custom-protocol

    runs-on: ${{ matrix.platform }}
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      notes: ${{ steps.changelog.outputs.NOTES }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev
          sudo apt-get install -y libnm-dev xdg-utils

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || (matrix.platform == 'macos-latest' && 'aarch64-apple-darwin') || '' }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "Tag: $GITHUB_REF_NAME -> Version: ${GITHUB_REF_NAME#v}"

      - name: Update version in config files
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          # Update all version files (package.json, tauri.conf.json, Cargo.toml)
          node scripts/update-version.cjs $VERSION
          echo "Updated version to $VERSION"

      - name: Generate CHANGELOG
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          # 使用 Node.js 脚本生成 CHANGELOG 并提取 release notes
          node scripts/generate-changelog.cjs $VERSION

          # 只在第一个平台（macOS ARM64）提交 CHANGELOG 更新
          if [ "${{ matrix.generate-changelog }}" == "true" ]; then
            echo "📤 提交 CHANGELOG 更新..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
            git diff --staged --quiet || git commit -m "docs: 更新 CHANGELOG 和版本号 [skip ci]"
            git push origin HEAD:master
          else
            echo "⏭️  跳过提交（由第一个平台处理）"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mnemosyne ${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.NOTES }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }} ${{ matrix.args }}


  # 单独的 job 上传 latest.json，等待所有构建完成后执行
  upload-latest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download signature files from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          mkdir -p signatures

          # 下载所有 .sig 文件到 signatures 目录
          gh release download "v${VERSION}" -p "*.sig" --dir signatures || echo "No signature files found"

          # 列出下载的签名文件
          ls -la signatures/

      - name: Generate latest.json with signatures
        shell: bash
        env:
          VERSION: ${{ needs.release.outputs.version }}
          NOTES: ${{ needs.release.outputs.notes }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            const VERSION = process.env.VERSION;
            const NOTES = process.env.NOTES || '暂无更新内容';
            const repoOwner = process.env.REPO_OWNER;
            const repoName = process.env.REPO_NAME;

            console.log('Generating latest.json for version:', VERSION);

            // 读取签名文件内容的辅助函数
            function readSignature(filePath) {
              try {
                if (fs.existsSync(filePath)) {
                  // 读取 .sig 文件的内容并去除空白字符
                  const sigContent = fs.readFileSync(filePath, 'utf-8').trim();
                  console.log('Found signature file:', filePath);
                  return sigContent;
                }
              } catch (err) {
                console.log('Error reading signature file:', filePath, err.message);
              }
              return '';
            }

            // 根据实际的 Release 文件名匹配签名文件
            // Windows: Mnemosyne_<VERSION>_x64-setup.exe.sig
            const windowsSig = readSignature('signatures/Mnemosyne_' + VERSION + '_x64-setup.exe.sig');
            // macOS: Mnemosyne_aarch64.app.tar.gz.sig (注意：Tauri 生成的 macOS 文件名不带版本号)
            const macSig = readSignature('signatures/Mnemosyne_aarch64.app.tar.gz.sig');

            const latest = {
              version: VERSION,
              notes: NOTES,
              pub_date: new Date().toISOString(),
              platforms: {}
            };

            // Windows 平台
            if (windowsSig) {
              latest.platforms['windows-x86_64'] = {
                url: 'https://github.com/' + repoOwner + '/' + repoName + '/releases/download/v' + VERSION + '/Mnemosyne_' + VERSION + '_x64-setup.nsis.zip',
                signature: windowsSig
              };
            }

            // macOS 平台
            if (macSig) {
              latest.platforms['darwin-aarch64'] = {
                url: 'https://github.com/' + repoOwner + '/' + repoName + '/releases/download/v' + VERSION + '/Mnemosyne_aarch64.app.tar.gz',
                signature: macSig
              };
            }

            fs.writeFileSync('latest.json', JSON.stringify(latest, null, 2));
            console.log('Generated latest.json');
            console.log('Windows signature:', windowsSig ? 'present' : 'MISSING');
            console.log('macOS signature:', macSig ? 'present' : 'MISSING');
          "

      - name: Upload latest.json to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 显示生成的 latest.json 内容
          cat latest.json

          # 如果文件已存在，先删除再上传
          gh release upload ${{ github.ref_name }} latest.json --clobber
